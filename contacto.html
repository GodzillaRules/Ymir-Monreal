<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto — Ymir Monreal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background-color: #faf9f6;
      color: #1a1a1a;
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 280px;
      flex-shrink: 0;
      border-right: 0.5px solid rgba(0,0,0,0.15);
      padding: 3rem 2.5rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background-color: #eceae3;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .back-link {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #999;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2rem;
      transition: color 0.2s;
    }

    .back-link:hover { color: #1a1a1a; }

    .artist-name {
      font-size: 36px;
      font-weight: 300;
      font-style: italic;
      line-height: 1.1;
      color: #1a1a1a;
      text-decoration: none;
      display: block;
    }

    .page-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aaa;
      margin-top: 1rem;
    }

    .sidebar-bottom {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 300;
      color: #999;
      letter-spacing: 0.08em;
    }

    .main-content {
      flex: 1;
      padding: 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-width: 700px;
    }

    .page-header {
      margin-bottom: 3rem;
      padding-bottom: 1.5rem;
      border-bottom: 0.5px solid rgba(0,0,0,0.12);
    }

    .page-title {
      font-size: 52px;
      font-weight: 300;
      font-style: italic;
      line-height: 1;
    }

    .contacto-intro {
      font-size: 18px;
      font-weight: 300;
      color: #666;
      line-height: 1.7;
      margin-bottom: 3rem;
      max-width: 480px;
    }

    /* ── Links de contacto ── */
    .contacto-links {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 4rem;
    }

    .contacto-link-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 0;
      border-bottom: 0.5px solid rgba(0,0,0,0.1);
      text-decoration: none;
      color: inherit;
      transition: padding-left 0.2s;
    }

    .contacto-link-item:first-child {
      border-top: 0.5px solid rgba(0,0,0,0.1);
    }

    .contacto-link-item:hover {
      padding-left: 8px;
    }

    .contacto-link-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #aaa;
      width: 100px;
    }

    .contacto-link-valor {
      font-size: 18px;
      font-weight: 300;
      font-style: italic;
      color: #1a1a1a;
      flex: 1;
    }

    .contacto-link-arrow {
      font-size: 14px;
      color: #ccc;
      transition: color 0.2s, transform 0.2s;
    }

    .contacto-link-item:hover .contacto-link-arrow {
      color: #1a1a1a;
      transform: translateX(4px);
    }

    .contacto-nota {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: #bbb;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div>
      <a class="back-link" href="index.html">← Volver</a>
      <a class="artist-name" href="index.html">Ymir<br>Monreal</a>
      <p class="page-label">Contacto</p>
    </div>
    <div class="sidebar-bottom">Multimedial — 2025</div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">Contacto</h1>
    </div>

    <p class="contacto-intro">
      <!-- Cambia este texto -->
      Si tienes alguna consulta sobre mi trabajo o quieres colaborar, no dudes en escribirme.
    </p>

    <div class="contacto-links">

      <!-- ── Email ── cambia tu@email.com -->
      <a class="contacto-link-item" href="mailto:tu@email.com">
        <span class="contacto-link-label">Email</span>
        <span class="contacto-link-valor">tu@email.com</span>
        <span class="contacto-link-arrow">→</span>
      </a>

      <!-- ── Instagram ── cambia @tu_usuario -->
      <a class="contacto-link-item" href="https://instagram.com/tu_usuario" target="_blank">
        <span class="contacto-link-label">Instagram</span>
        <span class="contacto-link-valor">@tu_usuario</span>
        <span class="contacto-link-arrow">→</span>
      </a>

      <!-- ── Agrega o quita canales según necesites ──
      <a class="contacto-link-item" href="https://...">
        <span class="contacto-link-label">LinkedIn</span>
        <span class="contacto-link-valor">Tu nombre</span>
        <span class="contacto-link-arrow">→</span>
      </a>
      -->

    </div>

    <p class="contacto-nota">Santiago, Chile — disponible para proyectos</p>
    <!-- Cambia esta línea según tu disponibilidad -->
  </main>

</body>
</html>
